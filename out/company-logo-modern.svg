<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="380" viewBox="0 0 1400 380" role="img" aria-label="DFX Engineering modern header">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f4fe0"/>
      <stop offset="100%" stop-color="#1792e8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1e3a8a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1400" height="380" rx="28" fill="url(#bgGrad)"/>

  <polygon points="980,0 1400,0 1400,380 820,380" fill="#d8e7f6" opacity="0.75"/>
  <polygon points="1110,0 1400,0 1400,380 990,380" fill="#c6dcf2" opacity="0.85"/>

  <rect x="0" y="312" width="1400" height="16" fill="url(#accentGrad)"/>

  <g filter="url(#softShadow)">
    <text x="145" y="195" font-size="176" font-weight="900" font-family="Segoe UI, Arial, sans-serif" fill="#1b34c8" letter-spacing="-4">DFX</text>
    <text x="156" y="252" font-size="42" font-weight="500" font-family="Segoe UI, Arial, sans-serif" fill="#243b8f" letter-spacing="20">Engineering</text>
  </g>

  <circle cx="1110" cy="120" r="10" fill="#4aa3ff" opacity="0.6"/>
  <circle cx="1160" cy="152" r="6" fill="#1f4fe0" opacity="0.45"/>
  <circle cx="1230" cy="108" r="8" fill="#1f4fe0" opacity="0.4"/>
</svg>
